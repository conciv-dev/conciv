packages:
  - packages/*
  - packages/extensions/*
  - apps/*
  - apps/examples/*

# Force patched protobufjs (GHSA-wcpc-wj8m-hjx6 prototype pollution); pulled in transitively
# via jazz-tools OpenTelemetry in the whiteboard extension.
overrides:
  protobufjs@<8.4.1: '>=8.4.1'
  # lodash-es _.template code injection (GHSA-r5fr-rjxr-66jc); npm never shipped 4.17.24, the
  # patched line is 4.18.x. Pulled in transitively via @excalidraw in the whiteboard extension.
  lodash-es@<4.18.0: '>=4.18.1'
  # Remaining dependabot alerts (2026-07) where every upstream parent, including its latest
  # release, hard-pins a vulnerable version. Floors move them to the patched line without
  # crossing a major. Drop each once the parent ships a fix.
  # @excalidraw/excalidraw pins nanoid 3.3.3 exact (predictable-id advisory).
  nanoid@<3.3.8: '>=3.3.8 <4'
  # @excalidraw/mermaid-to-excalidraw pins nanoid 4.0.2 exact; the only patched line is 5.x,
  # which is API-compatible for its plain nanoid() usage.
  'nanoid@>=4.0.0 <5.0.9': '>=5.0.9 <6'
  # next (incl. latest 16.x) pins postcss 8.4.31 exact (</style> XSS advisory).
  postcss@<8.5.10: '>=8.5.10 <9'
  # jazz-tools (latest alpha) pins esbuild ^0.27; the dev-server advisory window is
  # 0.27.3-0.28.0 only, so only that window is floored to 0.28.1.
  'esbuild@>=0.27.3 <0.28.1': '>=0.28.1'
  # @netlify/otel (via nitro>unstorage>@netlify/blobs) pins @opentelemetry/core 2.7.1 exact.
  '@opentelemetry/core@<2.8.0': '>=2.8.0 <3'

# drizzle-kit 1.0.0-rc ships without a drizzle-orm dependency/peer yet requires
# `drizzle-orm/_relations` at runtime, assuming a flat node_modules. Under pnpm's isolated
# layout that require falls back to the hidden-hoisted drizzle-orm, which can be the
# whiteboard extension's stable 0.45.x (no `_relations` export) and crashes. Declare the
# missing peer so each consumer's own drizzle-orm is linked beside its drizzle-kit.
# Scoped to the 1.0 line (@conciv/db pins 1.0.0-rc.4); drop when drizzle-kit 1.0 stable
# fixes its manifest.
packageExtensions:
  'drizzle-kit@>=1.0.0-0 <2':
    peerDependencies:
      drizzle-orm: '*'

# Supply-chain hardening (pnpm 11). Only these deps may run install/build scripts;
# everything else is blocked by strictDepBuilds (default on in pnpm 11).
# Dev-only tooling and its native deps are blocked - not needed to build, test,
# or publish, and a blocked script is one less worm entry point.
allowBuilds:
  esbuild: true
  lightningcss: true
  workerd: true
  '@parcel/watcher': false
  sharp: false
  unix-dgram: false
  unrs-resolver: false
  protobufjs: false
  '@swc/core': false
  # Node-side ONNX runtime pulled in by @huggingface/transformers; the site demo runs
  # inference in the browser (onnxruntime-web), so the native binary is never used.
  onnxruntime-node: false
  # Runtime dependency of @conciv/core tty mode: the pty native binding must compile.
  node-pty: true

# Gate dependency *resolution* (lockfile updates on dev machines): don't pick npm
# versions younger than 48h, so a poisoned release is likely yanked before it ever
# enters the lockfile. CI runs --frozen-lockfile and never re-resolves, so there the
# real controls are the reviewed lockfile + Socket Firewall, not this cooldown.
minimumReleaseAge: 2880
# @publint/pack is a fresh third-party transitive dep (publint/tsdown); excluded only
# to unblock dev lockfile updates while it ages past the window. Build-script-blocked
# regardless. Remove once it has aged out.
minimumReleaseAgeExclude:
  - '@publint/pack'
  # @tanstack/ai stack pinned by the 2026-07-06 tanstack-harness-migration plan (versions
  # verified against the tanstack/ai repo); released same-day, excluded to unblock the
  # migration. Drop once the pinned versions age past the window.
  - '@tanstack/ai'
  - '@tanstack/ai-client'
  - '@tanstack/ai-solid'
  - '@tanstack/ai-mcp'
  - '@tanstack/ai-sandbox'
  - '@tanstack/ai-sandbox-local-process'
  - '@tanstack/ai-claude-code'
  - '@tanstack/ai-codex'
  - '@tanstack/ai-opencode'
  - '@tanstack/ai-acp'
  # jazz-tools alpha moves faster than the 48h window; the whiteboard extension pins an exact
  # alpha (reviewed in the migration plan). Drop these once Jazz reaches a stable cadence.
  - 'jazz-tools'
  - 'jazz-napi'
  - 'jazz-wasm'
  - '@garden-co/jazz-napi-darwin-arm64'
  - '@garden-co/jazz-napi-darwin-x64'
  - '@garden-co/jazz-napi-linux-x64-gnu'
  - '@garden-co/jazz-napi-win32-x64-msvc'
