<svg width="1080" height="540" viewBox="0 0 1080 540" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b140f"/>
      <stop offset="1" stop-color="#130d0a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#241a14"/>
      <stop offset="1" stop-color="#1d1510"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef5a2a"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1078" height="538" rx="24" fill="url(#bg)" stroke="#302219"/>

  <!-- ============ LEFT: your running app (browser) ============ -->
  <text x="64" y="118" fill="#ef5a2a" font-size="12" font-weight="700" letter-spacing="2.5">IN&#160;YOUR&#160;APP</text>

  <!-- browser window -->
  <rect x="60" y="136" width="380" height="268" rx="16" fill="url(#card)" stroke="#3f2e25"/>
  <!-- title bar -->
  <line x1="60" y1="184" x2="440" y2="184" stroke="#332419"/>
  <circle cx="88" cy="160" r="5.5" fill="#453228"/>
  <circle cx="108" cy="160" r="5.5" fill="#453228"/>
  <circle cx="128" cy="160" r="5.5" fill="#453228"/>
  <rect x="150" y="147" width="264" height="26" rx="13" fill="#1a120d"/>
  <text x="282" y="164.5" fill="#8f8379" font-size="12.5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">localhost:3000</text>

  <!-- app skeleton -->
  <rect x="84" y="208" width="150" height="13" rx="6.5" fill="#33251c"/>
  <rect x="84" y="234" width="108" height="13" rx="6.5" fill="#2b1f17"/>
  <rect x="84" y="260" width="128" height="13" rx="6.5" fill="#2b1f17"/>
  <rect x="84" y="299" width="86" height="26" rx="13" fill="#33251c"/>
  <text x="90" y="382" fill="#7d7268" font-size="13.5" font-style="italic">the app you're building…</text>

  <!-- the widget, docked inside the app -->
  <rect x="252" y="208" width="164" height="172" rx="13" fill="#2a1d15" stroke="#ef5a2a" stroke-width="1.5"/>
  <text x="270" y="238" fill="#f6f0e6" font-size="15.5" font-weight="800"><tspan fill="#ef5a2a">✦</tspan> conciv</text>
  <rect x="270" y="252" width="128" height="10" rx="5" fill="#3d2b20"/>
  <rect x="270" y="270" width="100" height="10" rx="5" fill="#3d2b20"/>
  <rect x="270" y="296" width="128" height="10" rx="5" fill="#352519"/>
  <rect x="270" y="314" width="86" height="10" rx="5" fill="#352519"/>
  <rect x="270" y="340" width="128" height="24" rx="12" fill="#1a120d"/>
  <text x="280" y="356" fill="#7d7268" font-size="11.5">ask conciv…</text>
  <text x="334" y="398" fill="#a2968c" font-size="12.5" text-anchor="middle">the widget</text>

  <!-- ============ RIGHT: your coding CLI (terminal) ============ -->
  <text x="648" y="118" fill="#ef5a2a" font-size="12" font-weight="700" letter-spacing="2.5">ON&#160;YOUR&#160;MACHINE</text>

  <rect x="644" y="136" width="376" height="268" rx="16" fill="#191210" stroke="#3f2e25"/>
  <line x1="644" y1="184" x2="1020" y2="184" stroke="#332419"/>
  <circle cx="672" cy="160" r="5.5" fill="#453228"/>
  <circle cx="692" cy="160" r="5.5" fill="#453228"/>
  <circle cx="712" cy="160" r="5.5" fill="#453228"/>
  <text x="832" y="165" fill="#8f8379" font-size="12.5" text-anchor="middle" letter-spacing="1.5">YOUR&#160;CODING&#160;AGENT</text>

  <g font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">
    <text x="672" y="224" fill="#a2968c"><tspan fill="#ef5a2a">$</tspan> claude -p</text>
    <text x="672" y="256" fill="#6e645b">reads your code · edits files</text>
    <text x="672" y="284" fill="#6e645b">runs your tests · drives the page</text>
    <text x="672" y="330" fill="#a2968c">harness-agnostic:</text>
    <text x="672" y="360" fill="#f6f0e6">claude <tspan fill="#6e645b">·</tspan> codex <tspan fill="#6e645b">·</tspan> gemini <tspan fill="#6e645b">·</tspan> …</text>
  </g>

  <!-- ============ MIDDLE: core relay ============ -->
  <line x1="448" y1="270" x2="493" y2="270" stroke="#ef5a2a" stroke-width="2.5" marker-start="url(#arrow)"/>
  <line x1="587" y1="270" x2="636" y2="270" stroke="#ef5a2a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="497" y="246" width="86" height="48" rx="24" fill="#2a1d15" stroke="#ef5a2a" stroke-width="1.5"/>
  <text x="540" y="276" fill="#f6f0e6" font-size="14.5" font-weight="700" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">core</text>
  <text x="540" y="228" fill="#8f8379" font-size="12.5" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">/api/* · SSE</text>
  <text x="540" y="318" fill="#8f8379" font-size="12.5" text-anchor="middle">chat · page-bus · tests</text>

  <!-- ============ footer ============ -->
  <line x1="60" y1="452" x2="1020" y2="452" stroke="#2b1f18"/>
  <text x="540" y="488" fill="#8f8379" font-size="15" text-anchor="middle">one plugin wires it all: <tspan fill="#f6f0e6" font-weight="600" font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace">@conciv/plugin</tspan>  —  vite · webpack · rspack · rollup · esbuild</text>
</svg>
