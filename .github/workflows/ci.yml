name: CI

on:
  workflow_call: {}
  pull_request: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      # CI-gate caches. Safe ONLY while no workflow runs untrusted code on a trusted
      # ref (no pull_request_target): GitHub scopes cache writes per-ref, so fork PRs
      # cannot poison main's cache, and the publish job (release.yml) stays cache-free.
      # Playwright Chromium: exact lockfile-hash key, NO restore-keys — a broad prefix
      # would let a poisoned browser binary launder forward across lockfile changes.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      # Turbo cache: scoped within a lockfile generation, so a dependency change
      # discards prior cache instead of carrying (and laundering) it forward.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
      - uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free
      - run: sfw pnpm i --frozen-lockfile # Socket Firewall blocks known-malicious packages at install
      - run: pnpm --filter @conciv/widget exec playwright install --with-deps chromium # real-browser vitest tests
      # Only the publishable libraries; the example/site apps are private and not part of the release gate.
      # Single turbo run: build is deduped (once per package) and shared by typecheck/test.
      # SKIP_STORYBOOK_TESTS: storybook browser tests are skipped here (upstream cold-optimize race
      # on constrained runners); they run locally. See packages/*/vitest.config.ts.
      - run: pnpm exec turbo run typecheck lint test --filter='./packages/*'
        env:
          SKIP_STORYBOOK_TESTS: '1'
      # Enforce the no-comments rule everywhere (incl. apps/), without pulling the private apps into the build/test gate.
      - run: pnpm exec oxlint -A all -D conciv/no-comments

  zizmor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false # fail the job on workflow-security findings instead of uploading SARIF
