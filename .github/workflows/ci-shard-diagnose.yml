# Throwaway diagnostic for the build+test sharding (delete before merging to main).
# Matrix-runs each shard repeatedly, fully uncapped, with a cold turbo cache, to
# (a) measure per-shard wall clock and (b) prove no browser-suite flakes reappear
# without VITEST_MAX_WORKERS=1 / --concurrency=3. Whiteboard legs also A/B the
# fileParallelism:false serialization (added for Jazz-server startup contention;
# Jazz is gone since the libSQL migration).
name: ci-shard-diagnose
on:
  workflow_dispatch: {}
  push:
    branches: [diag/ci-shard]

permissions:
  contents: read

jobs:
  shard:
    name: ${{ matrix.leg }} r${{ matrix.round }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        leg: [node, embed, terminal, wb-serial, wb-par2, wb-par4]
        round: [1, 2, 3, 4, 5, 6]
        exclude:
          - {leg: node, round: 4}
          - {leg: node, round: 5}
          - {leg: node, round: 6}
          - {leg: wb-serial, round: 4}
          - {leg: wb-serial, round: 5}
          - {leg: wb-serial, round: 6}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      # No turbo cache on purpose: every leg measures a fully cold shard.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        if: matrix.leg != 'node'
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm i --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
        if: matrix.leg != 'node' && steps.playwright-cache.outputs.cache-hit != 'true'
      - run: pnpm exec playwright install-deps chromium
        if: matrix.leg != 'node' && steps.playwright-cache.outputs.cache-hit == 'true'
      - name: Unserialize whiteboard files
        if: matrix.leg == 'wb-par2' || matrix.leg == 'wb-par4'
        run: |
          perl -ni -e 'print unless /fileParallelism/' packages/extensions/whiteboard/vitest.config.ts
          grep -c fileParallelism packages/extensions/whiteboard/vitest.config.ts && exit 1 || true
      - name: node shard
        if: matrix.leg == 'node'
        run: >-
          pnpm exec turbo run typecheck lint test
          --filter='./packages/*' --filter='./packages/extensions/*'
          --filter='!@conciv/extension-whiteboard' --filter='!@conciv/embed' --filter='!@conciv/page'
          --filter='!@conciv/extension-terminal' --filter='!@conciv/extension-test-runner'
          --filter='!@conciv/extension-testkit' --filter='!@conciv/extension-try-it'
          --filter='!@conciv/react' --filter='!@conciv/preact' --filter='!@conciv/solid'
          --filter='!@conciv/ui-kit-chat' --filter='!@conciv/ui-kit-chat-tools' --filter='!@conciv/ui-kit-system'
          --filter='!@conciv/ui-kit-tap' --filter='!@conciv/ui-kit-terminal'
      - name: node shard bundle-size build
        if: matrix.leg == 'node'
        run: pnpm exec turbo run build --filter='./packages/*' --filter='./packages/extensions/*'
      - name: embed shard
        if: matrix.leg == 'embed'
        run: >-
          pnpm exec turbo run typecheck lint test
          --filter=@conciv/embed --filter=@conciv/page
          --filter=@conciv/react --filter=@conciv/preact --filter=@conciv/solid
          --filter=@conciv/ui-kit-chat --filter=@conciv/ui-kit-chat-tools --filter=@conciv/ui-kit-system
          --filter=@conciv/ui-kit-tap
      - name: terminal shard
        if: matrix.leg == 'terminal'
        run: >-
          pnpm exec turbo run typecheck lint test
          --filter=@conciv/extension-terminal --filter=@conciv/extension-test-runner
          --filter=@conciv/extension-testkit --filter=@conciv/extension-try-it
          --filter=@conciv/ui-kit-terminal
      - name: whiteboard shard
        if: matrix.leg == 'wb-serial' || matrix.leg == 'wb-par2' || matrix.leg == 'wb-par4'
        run: pnpm exec turbo run typecheck lint test --filter=@conciv/extension-whiteboard
        env:
          VITEST_MAX_WORKERS: ${{ matrix.leg == 'wb-par2' && '2' || matrix.leg == 'wb-par4' && '4' || '' }}
