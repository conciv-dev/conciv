# Throwaway diagnostic for the build+test sharding (delete before merging to main).
# Exercises the production planner -> dynamic matrix -> shard-run pipeline end to
# end, including the no-baseline bootstrap path and a seeded-timings path.
name: ci-shard-diagnose
on:
  workflow_dispatch: {}
  push:
    branches: [diag/ci-shard]

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Seed timings from the measured 2026-07-18 diag rounds
        run: |
          cat > ci-test-timings.json <<'EOF'
          {
            "@conciv/core": 52000,
            "@conciv/embed": 45000,
            "@conciv/extension-terminal": 28000,
            "@conciv/extension-test-runner": 30000,
            "@conciv/extension-testkit": 25000,
            "@conciv/extension-whiteboard": 170000
          }
          EOF
      - id: plan
        run: node packages/vitest-config/src/ci-shards.ts plan --timings ci-test-timings.json

  shard:
    name: shard ${{ matrix.shard }}
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        if: matrix.chromium
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm i --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
        if: matrix.chromium && steps.playwright-cache.outputs.cache-hit != 'true'
      - run: pnpm exec playwright install-deps chromium
        if: matrix.chromium && steps.playwright-cache.outputs.cache-hit == 'true'
      - run: pnpm exec conciv-ci-shards run
        env:
          SHARD_PACKAGES: ${{ matrix.packages }}
      - run: pnpm exec conciv-ci-shards timings --output "test-timings-${SHARD_NAME}.json"
        env:
          SHARD_NAME: ${{ matrix.shard }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: diag-test-timings-${{ matrix.shard }}
          path: test-timings-${{ matrix.shard }}.json

  merge:
    needs: shard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v8.0.1
        with:
          pattern: diag-test-timings-*
          merge-multiple: true
          path: shard-timings
      - run: node packages/vitest-config/src/ci-shards.ts merge-timings --output ci-test-timings.json shard-timings/*.json
      - run: cat ci-test-timings.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: diag-ci-test-timings
          path: ci-test-timings.json
