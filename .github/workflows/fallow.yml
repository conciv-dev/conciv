name: Fallow

on:
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fallow:
    name: Fallow audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0 # keep in sync with packageManager in package.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: pnpm
      # Same key/restore policy as ci.yml: scoped within a lockfile generation,
      # split restore/save so successful builds persist even when the audit fails,
      # github.job disambiguates from ci.yml's save on the same sha.
      - uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.job }}-${{ github.sha }}-${{ github.run_attempt }}
          restore-keys: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
      - uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f
        with:
          mode: firewall-free
          firewall-version: 1.13.1 # pinned: 'latest' does a GitHub Releases lookup that flakes CI
      - run: sfw pnpm i --frozen-lockfile
      - run: pnpm exec turbo run build --filter='./packages/*' --filter='./packages/extensions/*'
      - uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        if: always()
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.job }}-${{ github.sha }}-${{ github.run_attempt }}
      - uses: fallow-rs/fallow@c9326d9395c0b46f4077290473060b3e950b6e8c
        with:
          command: audit
          fail-on-issues: 'true'
          auto-changed-since: 'true'
          annotations: 'true'
