name: Fallow

# Codebase-intelligence gate: changed-file dead code, complexity, duplication.
# Report-only for now (fail-on-issues:false) — surfaces findings without blocking
# merges. Flip to true once the signal is tuned. Binary version comes from the root
# package.json fallow devDependency (Ed25519 + SHA-256 verified).
#
# This job builds the PR (untrusted code) so fallow can resolve @conciv/* imports,
# so it deliberately holds NO pull-requests: write token — a compromised build-time
# dep could not touch PRs. Findings surface via workflow-command annotations (no
# token) and SARIF -> Code Scanning (security-events: write only). It lives in its
# own workflow rather than ci.yml, which is also called as a reusable workflow by
# release.yml (a reusable workflow cannot request more than its caller's token grants).

on:
  pull_request: {}

# Untrusted PR code runs here (install + build); cap parallel runs so rapid
# pushes to a PR can't stack install+build jobs (runner-minutes DoS).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fallow:
    name: Fallow audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to Code Scanning (NOT pull-requests: write)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # audit needs git history for changed-file attribution
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      # Restore main's warm turbo cache (read-only prefix) so build is a cache hit.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
      - uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free
      - run: sfw pnpm i --frozen-lockfile # Socket Firewall blocks known-malicious packages at install
      # Build workspace packages so their dist/ exists: fallow resolves @conciv/*
      # imports against each package's exports map (dist-only). Without dist those
      # imports don't resolve and every internal dep is falsely flagged unused.
      - run: pnpm exec turbo run build --filter='./packages/*' --filter='./packages/extensions/*'
      - uses: fallow-rs/fallow@eaeb0634af797a69bae7600d2020dd99b33402ad # v2.100.0
        with:
          command: audit
          fail-on-issues: 'false' # report-only during rollout
          auto-changed-since: 'true' # scope to the PR diff
          annotations: 'true' # inline PR annotations via workflow commands (no write token)
          sarif: 'true' # upload to Code Scanning (security-events: write; free on public repos)
