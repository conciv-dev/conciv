name: Swift

# Required, path-filtered macOS conformance gate (plan 07 section 6, D15/M-A13). The
# cross-language bridge contract is guaranteed TS-side and Swift-side symmetrically:
# on PRs touching the bridge schema/fixtures (packages/extensions/ios) or the Swift
# source (native/swift/ConcivWidget), run gen:fixtures + `git diff --exit-code` (the
# in-repo drift gate, D2) then `swift build` + `swift test` from the NESTED manifest
# (macOS host, conformance only - no simulator; the sim lane stays manual for v1).
#
# `detect` runs on every PR and computes whether the ios/swift paths changed; the
# macOS job runs only when they did; the always() `swift-gate` job reports a single
# stable status context so a required check never deadlocks on unrelated PRs
# (mirrors ci.yml's build-gate idiom - "green != ran").

on:
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ -z "$BASE_SHA" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          if echo "$changed" | grep -qE '^(packages/extensions/ios/|native/swift/ConcivWidget/)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  swift:
    needs: detect
    if: needs.detect.outputs.run == 'true'
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0 # keep in sync with packageManager in package.json
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free
          firewall-version: 1.13.1 # pinned: 'latest' does a GitHub Releases lookup that flakes CI
      - run: sfw pnpm i --frozen-lockfile # Socket Firewall blocks known-malicious packages at install
      # In-repo fixture drift gate (D2): regenerate the canonical fixtures + the Swift
      # committed copy, then fail if either drifted from what the PR checked in.
      - run: pnpm --filter @conciv/extension-ios gen:fixtures
      - run: git diff --exit-code
      # Nested manifest (no root Package.swift; the mirror repo is a release artifact).
      # Conformance only: compile + decode/roundtrip the committed fixtures on the host.
      - name: swift build + test (nested manifest, conformance only)
        working-directory: native/swift/ConcivWidget
        run: |
          swift build
          swift test

  swift-gate:
    name: Swift conformance
    needs: [detect, swift]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - env:
          DETECT_RUN: ${{ needs.detect.outputs.run }}
          SWIFT_RESULT: ${{ needs.swift.result }}
        run: |
          if [ "$DETECT_RUN" != "true" ]; then
            echo "no packages/extensions/ios or native/swift changes; conformance gate not required"
            exit 0
          fi
          test "$SWIFT_RESULT" = "success"
