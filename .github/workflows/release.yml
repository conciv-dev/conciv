name: Release

on:
  push:
    branches: [main]

# Supersede a stale waiting/pending run instead of queueing behind it, so an
# unapproved run can't wedge later merges. The newest run publishes every
# still-unpublished package once approved, so cancelling older ones loses nothing.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege at the workflow level; the elevated grants live only on the
# release job so the test job (which runs untrusted dep/test code) never shares
# a run that carries id-token: write.
permissions:
  contents: read

jobs:
  # A called workflow can never hold more than the caller grants, so this must
  # cover every permission ci.yml's own jobs ask for — actions: read is how the
  # planner and bundle-size read their baseline artifacts. Omitting it fails the
  # whole run at STARTUP ("Error calling workflow"), before any job appears, which
  # is how releases silently stopped running after #83 added the grant to ci.yml.
  test:
    permissions:
      contents: read
      actions: read
    uses: ./.github/workflows/ci.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      id-token: write # OIDC trusted publishing + provenance
      contents: write # changesets/action pushes the version commit
      pull-requests: write # changesets/action opens the version PR
    steps:
      # changesets/action needs the git credential to push the version commit/PR; this job
      # uploads no artifacts, so credential persistence is safe here.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 # zizmor: ignore[artipacked]
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0 # keep in sync with packageManager in package.json
      # No dependency cache in this job: it holds id-token: write and publishes to
      # npm, so restoring a shared Actions cache could turn cache poisoning into a
      # trusted-publish compromise. Fresh install only.
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free
          firewall-version: 1.13.1 # pinned: 'latest' does a GitHub Releases lookup that flakes CI
      # OIDC trusted publishing requires npm >= 11.5.1. Pinned exact + fetched through
      # the firewall: this job holds id-token: write, so an unpinned npm@latest here
      # would be a registry-compromise straight into the publish path.
      - run: sfw npm i -g npm@12.0.1
      - run: sfw pnpm i --frozen-lockfile # Socket Firewall blocks known-malicious packages at install
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          version: pnpm release:version
          publish: pnpm release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NPM_CONFIG_PROVENANCE: 'true' # npm CLI
          PNPM_CONFIG_PROVENANCE: 'true' # pnpm 11 reads pnpm_config_* prefix
          NPM_TOKEN: '' # empty -> npm CLI uses OIDC (.npmrc from registry-url)

  # The Swift SDK is not an npm package: source of truth is native/swift/ConcivWidget
  # in this repo, distribution is the conciv-dev/conciv-swift mirror (root Package.swift
  # + bare-semver tags SwiftPM can resolve). On a main push that touched the bridge
  # (packages/extensions/ios) or the Swift source, regenerate + tag the mirror. The
  # mirror push uses GH_MIRROR_TOKEN (a PAT with push access to the mirror repo), NOT
  # this repo's GITHUB_TOKEN, so this job never needs contents: write here and never
  # shares the release job's id-token. swift-mirror is idempotent: it skips when the
  # SWIFT_SDK_VERSION tag already exists, so a re-run or an unrelated push is a no-op.
  swift-mirror:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: detect
        env:
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$BEFORE_SHA" "$HEAD_SHA")
          if echo "$changed" | grep -qE '^(packages/extensions/ios/|native/swift/ConcivWidget/)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        if: steps.detect.outputs.run == 'true'
        with:
          version: 11.7.0 # keep in sync with packageManager in package.json
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        if: steps.detect.outputs.run == 'true'
        with:
          node-version: 22
          cache: pnpm
      - uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        if: steps.detect.outputs.run == 'true'
        with:
          mode: firewall-free
          firewall-version: 1.13.1 # pinned: 'latest' does a GitHub Releases lookup that flakes CI
      - run: sfw pnpm i --frozen-lockfile # Socket Firewall blocks known-malicious packages at install
        if: steps.detect.outputs.run == 'true'
      # In-repo fixture drift gate (D2): the mirror carries the committed fixture copy,
      # so refuse to publish a mirror whose fixtures drifted from the canonical table.
      - run: pnpm --filter @conciv/extension-ios gen:fixtures
        if: steps.detect.outputs.run == 'true'
      - run: git diff --exit-code
        if: steps.detect.outputs.run == 'true'
      # Regenerate the mirror tree from native/swift/ConcivWidget, tag it with
      # SWIFT_SDK_VERSION, and push (skipped when that tag already exists).
      - run: pnpm exec conciv-publish swift-mirror
        if: steps.detect.outputs.run == 'true'
        env:
          GH_MIRROR_TOKEN: ${{ secrets.GH_MIRROR_TOKEN }}
